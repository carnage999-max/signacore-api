services:
  api:
    build:
      context: .
    container_name: signacore-api
    env_file:
      - .env
    command:
      - gunicorn
      - signacore_api.wsgi:application
      - --bind
      - 0.0.0.0:8010
      - --workers
      - ${GUNICORN_WORKERS:-3}
      - --timeout
      - ${GUNICORN_TIMEOUT:-120}
    volumes:
      - ${SIGNACORE_STORAGE_ROOT:-/srv/signacore/storage}:/srv/signacore/storage
      - ${STATIC_ROOT:-/srv/signacore/staticfiles}:/srv/signacore/staticfiles
    ports:
      - "127.0.0.1:${SIGNACORE_API_PORT:-8010}:8010"
    restart: unless-stopped

  worker:
    build:
      context: .
    container_name: signacore-worker
    env_file:
      - .env
    command:
      - celery
      - -A
      - signacore_api
      - worker
      - --loglevel=info
      - --concurrency=${CELERY_CONCURRENCY:-2}
    volumes:
      - ${SIGNACORE_STORAGE_ROOT:-/srv/signacore/storage}:/srv/signacore/storage
      - ${STATIC_ROOT:-/srv/signacore/staticfiles}:/srv/signacore/staticfiles
    restart: unless-stopped
    depends_on:
      - api

  beat:
    build:
      context: .
    container_name: signacore-beat
    env_file:
      - .env
    command:
      - celery
      - -A
      - signacore_api
      - beat
      - --loglevel=info
    volumes:
      - ${SIGNACORE_STORAGE_ROOT:-/srv/signacore/storage}:/srv/signacore/storage
      - ${STATIC_ROOT:-/srv/signacore/staticfiles}:/srv/signacore/staticfiles
    restart: unless-stopped
    depends_on:
      - api

networks:
  default:
    name: shared-net
    external: true
